<!DOCTYPE html>
<html lang="en">
<head>
    <title>JS test</title>
</head>
<body>
    <div id="btn" onclick="ChangeElement()">
        Press me!
    </div>
    <div id="change">
        Change me!
    </div>
</body>
</html>
<style>
    #btn{
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 10px;
        margin-bottom: 5px;
        width: 100px;
        background-color: #1bca96;
        color: white;
        cursor: pointer;
    }
    #change{
        display: flex;
        justify-content: center;
        align-items: center;
        width: 300px;
        height: 300px;
        background-color: #5b5d63;
    }
</style>

<script>
    function ChangeElement () {
        var element = document.getElementById('change')
        element.style.color = 'white'
        element.style.backgroundColor = 'blue'
        element.style.fontSize = '24px'
}
</script>
