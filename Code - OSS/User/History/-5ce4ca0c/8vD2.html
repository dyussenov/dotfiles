
{% extends '../base.html' %}
{% load static %}
{% block content %}
 <div class="page-container">
    <!-- HEADER DESKTOP-->
    {%include '../userbar.html' %}
    <!-- HEADER DESKTOP-->

    <!-- MAIN CONTENT-->
    <div class="main-content">
        <div class="section__content section__content--p30">
            <div class="container-fluid">
                <div class="row">
                    <div class="col-md-12">
                        <div class="overview-wrap">
                            <h2 class="title-1">Добавить учителя</h2>
                        </div>
                    </div>
                </div>
                <br>
                <div class="row">
                    <div class="col-lg-12">
                        <div class="card">
                            <div class="card-body card-block">
                                <form method="post" enctype="multipart/form-data">
                                    {% csrf_token %}
                                    <div class="form-group">
                                        <label class=" form-control-label">Имя</label>
                                        {{ form.first_name}}
                                    </div>
                                 <div class="form-group">
                                        <label class=" form-control-label">Фамилия</label>
                                        {{ form.last_name}}
                                    </div>
                                 <div class="form-group">
                                        <label class=" form-control-label">Возраст</label>
                                        {{ form.age}}
                                    </div>
                                    <div class="form-group">
                                        <label class=" form-control-label">Кафедра</label>
                                        {{ form.kafedra}}
                                    </div>
                                  <div class="form-group">
                                        <label class=" form-control-label">ПРедмет</label>
                                        {{ form.subject}}
                                    </div>
                                <div class="form-group">
                                    <label class="form-check-label">Фотография</label>
                                    {{ form.image }}
                                </div>



                                    {% if model %}
                                    <button type="submit" class="btn btn-warning btn-md">Сохранить</button>
                                    {% else %}
                                    <button type="submit" class="btn btn-success btn-md">Добавить</button>
                                    {% endif %}
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- END MAIN CONTENT-->
    <!-- END PAGE CONTAINER-->
</div>
{% endblock %}
